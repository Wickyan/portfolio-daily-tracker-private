services:
  # Portfolio Dashboard Backend (FastAPI)
  backend:
    build:
      context: ./dashboard
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    volumes:
      - ./engine/portfolio:/app/portfolio:ro
      - ./dashboard/data:/app/data
      - ./dashboard/config.json:/app/config.json
    environment:
      - PORTFOLIO_DIR=/app/portfolio
    restart: unless-stopped

  # Portfolio Dashboard Frontend (React + Vite)
  frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Internal access gateway with Basic Auth
  nginx:
    image: nginx:alpine
    ports:
      - "55589:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # Portfolio Engine — run manually or via scheduler
  # Usage: docker compose run engine python scripts/portfolio_snapshot.py
  engine:
    profiles:
      - tools
    build:
      context: ./engine
      dockerfile: Dockerfile
    volumes:
      - ./engine/portfolio:/app/portfolio
    working_dir: /app
